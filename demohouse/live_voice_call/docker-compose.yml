services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: live-voice-backend
    env_file:
      - .env
    environment:
      WS_HOST: 0.0.0.0
      WS_PORT: 8888
      LOG_HOST: 0.0.0.0
      LOG_PORT: 8889
      ADMIN_API_HOST: 0.0.0.0
      ADMIN_API_PORT: 8890
    volumes:
      - ./backend/data:/app/backend/data
      - ./backend/logs:/app/backend/logs
    expose:
      - "8888"
      - "8889"
      - "8890"
    restart: unless-stopped

  gateway:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: live-voice-gateway
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/letsencrypt:/etc/letsencrypt
      - ./deploy/acme-webroot:/var/www/certbot
    restart: unless-stopped

  certbot:
    image: certbot/certbot:latest
    container_name: live-voice-certbot
    profiles:
      - certbot
    volumes:
      - ./deploy/letsencrypt:/etc/letsencrypt
      - ./deploy/acme-webroot:/var/www/certbot
